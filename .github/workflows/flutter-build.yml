name: Build APK

on:
  push:
    branches:
      - main

env:
  SKIP_TESTS: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: options_app

    steps:
      # ✅ Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Cache Pub + Flutter
      - name: Cache Flutter & Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ✅ Cache Gradle (BIG SPEED BOOST)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ✅ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true   # 🔥 important

      # ✅ Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # ❌ REMOVE this if already generated locally
      # - name: Generate Splash Screen
      #   run: dart run flutter_native_splash:create

      # ✅ Run tests
      - name: Run tests
        if: env.SKIP_TESTS != 'true'
        run: flutter test

      # ✅ Faster build
      - name: Build APK
        run: flutter build apk --release --split-debug-info=build/debug-info

      # ✅ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: options_app/build/app/outputs/flutter-apk/app-release.apk
